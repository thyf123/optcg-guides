<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OPTCG Matchup Guide</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',Arial,sans-serif;background:#16162a;color:#ddd}

/* ── APP SHELL ── */
#app{position:fixed;inset:0;overflow:hidden}

/* ── SCREENS ── */
.screen{
  display:none;
  position:absolute;inset:0;
  overflow-y:auto;overflow-x:hidden;
  padding:16px;
  }
.screen.active{display:block;position:absolute;inset:0;z-index:10;}

/* ── MATCHUP SCREEN ── */
#screen-matchup h1{font-size:1rem;color:#c9a84c;font-weight:700}
#screen-matchup .sub{font-size:0.7rem;color:#666;margin:2px 0 12px}

.legend{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.leg{display:flex;align-items:center;gap:4px;font-size:0.67rem;color:#999}
.sw{width:11px;height:11px;border-radius:2px;display:inline-block;flex-shrink:0}

table{border-collapse:collapse;width:100%;font-size:0.78rem}
th{background:#1e1e36;color:#c9a84c;padding:6px 10px;text-align:left;font-size:0.63rem;letter-spacing:0.08em;text-transform:uppercase;border-bottom:2px solid #c9a84c44;white-space:nowrap}
tr.data-row{cursor:pointer}
tr.data-row td{padding:5px 10px;border-bottom:1px solid #1e1e36;transition:background 0.1s}
tr.data-row:hover td{background:#22223a}
tr.data-row.active td{background:#252545}

.mname{font-weight:600;white-space:nowrap}
.warn{color:#e07050;margin-left:3px;font-size:0.72rem}
.wr{font-size:0.7rem;font-weight:700;padding:2px 5px;border-radius:3px;display:inline-block;min-width:38px;text-align:center;white-space:nowrap}
.wg{background:#1c6b30;color:#8fffaa}
.wl{background:#4a7a10;color:#c8ff80}
.wy{background:#7a6200;color:#ffe680}
.wo{background:#7a3c00;color:#ffb870}
.wr2{background:#7a1515;color:#ff9090}
.wn{background:#2a2a2a;color:#555}
.go{font-size:0.68rem;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap}
.go1{background:#1a3a6a;color:#80b8ff}
.go2{background:#3a1a1a;color:#ff9090}
.sty{font-size:0.67rem;color:#888;white-space:nowrap}

.deck-btn{display:inline-flex;align-items:center;gap:3px;font-size:0.63rem;font-weight:700;background:#1a3a2a;color:#60d090;border:1px solid #30803050;border-radius:4px;padding:2px 6px;cursor:pointer;white-space:nowrap;border:none;outline:none}
.deck-btn:active{background:#1f4a32}

/* detail panel */
tr.detail-row td{padding:0;border-bottom:1px solid #1e1e36}
.detail-panel{display:none;padding:10px 14px 12px 18px;background:#1a1a30;border-left:3px solid #c9a84c55}
.detail-panel.open{display:block}
.dl{font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#c9a84c;margin-bottom:3px}
.ei{display:flex;gap:6px;margin-bottom:3px}
.ec{font-weight:700;color:#ffd080;white-space:nowrap;flex-shrink:0;font-size:0.72rem}
.er{color:#c8b878;font-size:0.7rem;line-height:1.45}
.tips-list{list-style:none;padding:0}
.tips-list li{font-size:0.72rem;color:#bbb;padding:2px 0 2px 11px;position:relative;line-height:1.5}
.tips-list li::before{content:"·";position:absolute;left:3px;color:#c9a84c}
.ds{margin-bottom:8px}

/* ── DECK SCREEN ── */
#screen-deck{background:#16162a}

.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;font-weight:700;color:#c9a84c;background:#1e1e38;border:1px solid #c9a84c44;border-radius:7px;padding:6px 14px;cursor:pointer;margin-bottom:14px;border:none;outline:none;-webkit-tap-highlight-color:transparent}
.back-btn:active{background:#252545}

.deck-header{margin-bottom:14px}
.deck-header h2{font-size:1rem;color:#c9a84c;font-weight:700}
.deck-header .placement{font-size:0.75rem;color:#ffd080;margin-top:4px;font-weight:600}
.deck-header .meta{font-size:0.7rem;color:#888;margin-top:2px}
.deck-header .ext-link{display:inline-block;margin-top:5px;font-size:0.67rem;color:#6fa8dc;text-decoration:none;border-bottom:1px solid #6fa8dc44}
.deck-header .tap-hint{font-size:0.62rem;color:#555;margin-top:3px}

.leader-wrap{display:flex;align-items:flex-start;gap:12px;background:#1e1e38;border:1px solid #c9a84c55;border-radius:10px;padding:10px 12px;margin-bottom:18px}
.leader-img{width:88px;border-radius:7px;flex-shrink:0;cursor:pointer;display:block;transition:opacity 0.2s;opacity:0;background:#1a1a2e;min-height:62px}
.linfo h3{font-size:0.92rem;color:#ffd080;font-weight:700;line-height:1.2}
.linfo .lid{font-size:0.66rem;color:#777;margin-top:2px}
.linfo .leff{font-size:0.67rem;color:#bbb;margin-top:6px;line-height:1.55}
.ext-link-bottom{display:block;font-size:0.65rem;color:#555;text-decoration:none;padding:10px 0 2px;margin-top:8px}
.ext-link-bottom:hover{color:#888}
.pip{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:3px}
.pr{background:#e05050}.pg{background:#50c050}.pp{background:#9060d0}.py{background:#d0b030}

.sec-wrap{margin-bottom:18px}
.sec-hdr{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #2a2a4a;padding-bottom:4px;margin-bottom:8px}
.sec-title{font-size:0.68rem;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:#c9a84c}
.sec-cnt{font-size:0.65rem;color:#666}

.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.card-item{position:relative;border-radius:8px;overflow:hidden;background:#1a1a30;cursor:pointer;aspect-ratio:0.715}
.card-item img{width:100%;height:100%;object-fit:cover;display:block;border-radius:8px;transition:opacity 0.2s;opacity:0}
.card-item img.loaded{opacity:1}
.b-count{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.85);color:#ffd080;font-size:0.85rem;font-weight:900;border-radius:4px;padding:1px 6px;border:1px solid #c9a84c55;pointer-events:none;line-height:1.5}
.b-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.78);color:#bbb;font-size:0.57rem;text-align:center;padding:2px 2px 3px;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.total-bar{background:#1e1e38;border:1px solid #c9a84c22;border-radius:8px;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:4px;margin-bottom:20px}
.total-bar .tl{font-size:0.72rem;color:#888}
.total-bar .tc{font-size:1rem;font-weight:700;color:#ffd080}

/* modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:999;justify-content:center;align-items:center;flex-direction:column;gap:10px}
.modal.open{display:flex}
.modal img{max-width:90vw;max-height:78vh;border-radius:12px;box-shadow:0 0 40px rgba(0,0,0,0.95);transition:opacity 0.2s;opacity:0}
.modal-lbl{background:rgba(0,0,0,0.88);color:#ffd080;padding:5px 18px;border-radius:20px;font-size:0.76rem;font-weight:700;text-align:center;max-width:80vw}
.modal-spinner{width:36px;height:36px;border:3px solid #333;border-top:3px solid #c9a84c;border-radius:50%;animation:spin 0.8s linear infinite;position:absolute}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SEARCH / FILTER BAR ── */
.search-bar{display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.search-input{flex:1;min-width:120px;background:#1e1e36;border:1px solid #3a3a5a;border-radius:7px;color:#ddd;font-size:0.8rem;padding:6px 10px;outline:none}
.search-input:focus{border-color:#c9a84c88}
.search-input::placeholder{color:#555}
.filter-btns{display:flex;gap:4px;flex-wrap:wrap}
.fbtn{font-size:0.65rem;font-weight:700;border:none;border-radius:5px;padding:4px 8px;cursor:pointer;opacity:0.5;transition:opacity 0.15s}
.fbtn.active{opacity:1}
.fbtn-all{background:#333;color:#ddd}
.fbtn-r{background:#7a2020;color:#ffaaaa}
.fbtn-g{background:#1a5a1a;color:#aaffaa}
.fbtn-b{background:#1a2a7a;color:#aaaaff}
.fbtn-p{background:#4a1a7a;color:#ddaaff}
.fbtn-y{background:#7a6200;color:#ffe680}
.fbtn-bk{background:#2a2a2a;color:#aaaaaa}
.fbtn-warn{background:#5a2a10;color:#ffbb88}

/* ── MODE TOGGLE ── */
.mode-bar{display:flex;gap:6px;margin-bottom:10px;align-items:center}
.mode-btn{font-size:0.68rem;font-weight:700;border:1px solid #3a3a5a;border-radius:6px;padding:4px 10px;cursor:pointer;background:#1e1e36;color:#888;transition:all 0.15s}
.mode-btn.active{background:#c9a84c;color:#16162a;border-color:#c9a84c}
.mode-label{font-size:0.65rem;color:#555;margin-left:auto}

/* ── QUICK REF CARDS ── */
#qref-container{display:none}
#qref-container.visible{display:block}
#table-container.hidden{display:none}

.qref-card{background:#1e1e36;border:1px solid #2a2a4a;border-radius:10px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color 0.15s}
.qref-card:hover{border-color:#c9a84c55}
.qref-card.open{border-color:#c9a84c88}
.qref-card.hidden{display:none}

.qref-header{display:flex;align-items:center;gap:8px;padding:10px 12px}
.qref-name{font-size:0.9rem;font-weight:700;color:#ddd;flex:1}
.qref-warn{color:#e07050;font-size:0.8rem}
.qref-go{font-size:0.75rem;font-weight:900;padding:3px 9px;border-radius:5px;white-space:nowrap;letter-spacing:0.05em}
.qref-go.go1{background:#1a3a6a;color:#80b8ff;border:1px solid #2a5aaa}
.qref-go.go2{background:#5a1a1a;color:#ffaaaa;border:1px solid #aa3a3a}
.qref-wrs{display:flex;gap:4px}
.qref-wr{font-size:0.65rem;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap}
.qref-deck{font-size:0.7rem;background:#1a3a2a;color:#60d090;border:1px solid #30803050;border-radius:4px;padding:2px 7px;cursor:pointer;font-weight:700}

.qref-body{display:none;padding:0 12px 12px}
.qref-card.open .qref-body{display:block}
.qref-section{margin-top:10px}
.qref-section-title{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#c9a84c;margin-bottom:5px}
.qref-tips{list-style:none;padding:0}
.qref-tips li{font-size:0.75rem;color:#bbb;padding:2px 0 2px 12px;position:relative;line-height:1.5}
.qref-tips li::before{content:"·";position:absolute;left:3px;color:#c9a84c}
.qref-ess{display:flex;flex-direction:column;gap:4px}
.qref-ess-item{display:flex;gap:6px;align-items:flex-start}
.qref-ess-card{font-size:0.72rem;font-weight:700;color:#ffd080;white-space:nowrap;flex-shrink:0}
.qref-ess-reason{font-size:0.7rem;color:#c8b878;line-height:1.4}

/* ── MATCHUP INFO on deck page ── */
.matchup-info{background:#1a1a30;border:1px solid #c9a84c44;border-radius:10px;padding:12px 14px;margin-bottom:16px}
.mi-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.mi-name{font-size:1rem;font-weight:700;color:#ffd080}
.mi-go{font-size:0.8rem;font-weight:900;padding:4px 12px;border-radius:6px;letter-spacing:0.05em}
.mi-go.go1{background:#1a3a6a;color:#80b8ff;border:1px solid #2a5aaa}
.mi-go.go2{background:#5a1a1a;color:#ffaaaa;border:1px solid #aa3a3a}
.mi-wrs{display:flex;gap:5px;flex-wrap:wrap}
.mi-wr{font-size:0.7rem;font-weight:700;padding:2px 6px;border-radius:3px}
.mi-style{font-size:0.7rem;color:#888;margin-left:auto}
.mi-section{margin-top:10px}
.mi-section-title{font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#c9a84c;margin-bottom:5px}
.mi-tips{list-style:none;padding:0}
.mi-tips li{font-size:0.76rem;color:#bbb;padding:3px 0 3px 12px;position:relative;line-height:1.5;border-bottom:1px solid #2a2a3a}
.mi-tips li:last-child{border-bottom:none}
.mi-tips li::before{content:"·";position:absolute;left:3px;color:#c9a84c;font-size:1rem}
.mi-ess{display:flex;flex-direction:column;gap:5px}
.mi-ess-item{display:flex;gap:8px;align-items:flex-start;background:#16162a;border-radius:6px;padding:5px 8px}
.mi-ess-card{font-size:0.73rem;font-weight:700;color:#ffd080;white-space:nowrap;flex-shrink:0}
.mi-ess-reason{font-size:0.71rem;color:#c8b878;line-height:1.45}
.mi-divider{border:none;border-top:1px solid #2a2a4a;margin:14px 0}

/* ── FAVOURITES ── */
.fav-section{margin-bottom:14px;display:none}
.fav-title{font-size:0.67rem;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:#c9a84c;margin-bottom:8px}
.fav-grid{display:flex;gap:8px;flex-wrap:wrap}
.fav-card{position:relative;width:58px;cursor:pointer;flex-shrink:0}
.fav-card img{width:58px;border-radius:6px;display:block;opacity:0;transition:opacity 0.2s;border:1px solid #c9a84c44;background:#1a1a2e;min-height:40px}
.fav-card img.loaded{opacity:1}
.fav-card:hover img{border-color:#c9a84c88}
.fav-label{font-size:0.52rem;color:#888;text-align:center;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58px}
.fav-rm{position:absolute;top:-5px;right:-5px;background:#7a1515;color:#fff;border:none;border-radius:50%;width:15px;height:15px;font-size:0.72rem;line-height:15px;text-align:center;cursor:pointer;opacity:0;transition:opacity 0.15s;padding:0}
.fav-card:hover .fav-rm{opacity:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:0.82rem;padding:1px 4px;opacity:0.22;transition:opacity 0.15s;line-height:1;flex-shrink:0;color:#c9a84c}
.star-btn.starred{opacity:1}
/* ── HOME SCREEN ── */
#screen-home{padding:24px 16px}
.home-title{font-size:1.2rem;color:#c9a84c;font-weight:700;margin-bottom:6px;text-align:center}
.home-sub{font-size:0.72rem;color:#666;text-align:center;margin-bottom:28px}
.leader-grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.leader-card{background:#1e1e36;border:2px solid #2a2a50;border-radius:10px;padding:12px;cursor:pointer;width:150px;text-align:center;transition:border-color 0.18s,background 0.18s;}
.leader-card:hover{border-color:#c9a84c;background:#252545}
.leader-card img{width:100%;border-radius:6px;display:block;margin-bottom:8px}
.lc-name{font-size:0.75rem;color:#ccc;font-weight:600}
.lc-id{font-size:0.6rem;color:#666;margin-top:2px}

/* ── LOG MODAL ── */
#log-modal{position:fixed;inset:0;background:#000c;z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.log-card{background:#1e1e36;border:1px solid #c9a84c44;border-radius:12px;padding:20px;width:310px;max-width:100%}
.log-title{font-size:0.88rem;color:#c9a84c;font-weight:700;margin-bottom:16px}
.log-section{margin-bottom:12px}
.log-lbl{font-size:0.63rem;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em}
.log-row{display:flex;gap:8px}
.log-toggle{flex:1;padding:8px 0;border-radius:6px;border:1px solid #2a2a40;background:#13132a;color:#666;cursor:pointer;font-size:0.8rem;font-weight:600;transition:all 0.15s}
.log-toggle:hover{border-color:#555;color:#aaa}
.log-toggle.active[data-go="1st"]{border-color:#4a7a10;background:#1a3010;color:#c8ff80}
.log-toggle.active[data-go="2nd"]{border-color:#7a3c00;background:#301808;color:#ffb870}
.log-toggle.active[data-result="W"]{border-color:#1c6b30;background:#0e3018;color:#8fffaa}
.log-toggle.active[data-result="L"]{border-color:#7a1515;background:#300e0e;color:#ff9090}
.log-note-area{width:100%;height:64px;background:#13132a;border:1px solid #2a2a40;border-radius:6px;color:#ccc;font-size:0.75rem;padding:7px 9px;resize:none;font-family:inherit}
.log-note-area:focus{outline:none;border-color:#c9a84c55}
.log-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.log-cancel{padding:6px 14px;border-radius:6px;border:1px solid #333;background:none;color:#888;cursor:pointer;font-size:0.78rem}
.log-save{padding:6px 14px;border-radius:6px;border:none;background:#c9a84c;color:#111;cursor:pointer;font-size:0.78rem;font-weight:700}
.log-save:disabled{background:#2a2a1a;color:#555;cursor:not-allowed}
/* ── LOG BUTTON IN TABLE ── */
.log-btn{background:none;border:none;cursor:pointer;font-size:0.78rem;padding:1px 3px;opacity:0.3;transition:opacity 0.15s;color:#80b8ff;line-height:1}
.log-btn:hover{opacity:1}
/* ── YOU COLUMN ── */
.you-badge{font-size:0.68rem;font-weight:700;white-space:nowrap}
.you-w{color:#8fffaa}.you-l{color:#888}
/* ── MY SECTION (deck page) ── */
.my-section{margin-top:20px;border-top:1px solid #252535;padding-top:16px}
.my-section-title{font-size:0.68rem;color:#c9a84c;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}
.my-notes-area{width:100%;min-height:76px;background:#13132a;border:1px solid #252545;border-radius:7px;color:#c0c8e0;font-size:0.76rem;padding:8px 10px;resize:vertical;font-family:inherit;line-height:1.5}
.my-notes-area:focus{outline:none;border-color:#c9a84c44}
.my-record-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.my-record-num{font-size:0.85rem;font-weight:700}
.my-record-w{color:#8fffaa}.my-record-l{color:#ff9090}
.my-record-pct{font-size:0.7rem;color:#888}
.my-history-item{font-size:0.68rem;padding:5px 0;border-bottom:1px solid #1a1a2a;display:flex;gap:8px;align-items:baseline}
.my-res-w{color:#8fffaa;font-weight:700;min-width:16px}
.my-res-l{color:#ff9090;font-weight:700;min-width:16px}
.my-go{color:#999;min-width:28px}
.my-note-text{color:#aaa;flex:1;word-break:break-word}
.my-date{color:#444;flex-shrink:0}
.my-log-btn{font-size:0.7rem;padding:4px 10px;background:#1a2a3a;border:1px solid #3a5a7a;border-radius:5px;color:#80b8ff;cursor:pointer}

</style>
</head>
<body>
<div id="app">

<!-- ════ SCREEN 0: HOME ════ -->
<div class="screen active" id="screen-home">
  <div class="home-title">OPTCG Matchup Guide</div>
  <div class="home-sub">Choose a leader</div>
  <div class="leader-grid" id="leader-grid"></div>
</div>

<!-- ════ SCREEN 1: MATCHUP TABLE ════ -->
<div class="screen" id="screen-matchup">
  <h1 id="matchup-title">OP12-061 Donquixote Rosinante</h1>
  <p class="sub" id="matchup-sub">TCGMatchMaking.com · 25,255 games · 55.0% WR · EB03</p>

  <!-- Favourites -->
  <div id="fav-section" class="fav-section"></div>

  <!-- Mode toggle -->
  <div class="mode-bar">
    <button class="mode-btn active" id="btn-table" onclick="setMode('table')">Table</button>
    <button class="mode-btn" id="btn-qref" onclick="setMode('qref')">⚡ Quick Ref</button>
    <span class="mode-label">Quick Ref = pre-match cheat sheet</span>
  </div>

  <!-- Search + filter -->
  <div class="search-bar">
    <input class="search-input" id="search-input" type="text" placeholder="Search matchup…" oninput="applyFilters()">
    <div class="filter-btns">
      <button class="fbtn fbtn-all active" data-color="all" onclick="setColor(this)">All</button>
      <button class="fbtn fbtn-r" data-color="red" onclick="setColor(this)">Red</button>
      <button class="fbtn fbtn-g" data-color="green" onclick="setColor(this)">Green</button>
      <button class="fbtn fbtn-b" data-color="blue" onclick="setColor(this)">Blue</button>
      <button class="fbtn fbtn-p" data-color="purple" onclick="setColor(this)">Purple</button>
      <button class="fbtn fbtn-y" data-color="yellow" onclick="setColor(this)">Yellow</button>
      <button class="fbtn fbtn-bk" data-color="black" onclick="setColor(this)">Black</button>
      <button class="fbtn fbtn-warn" data-color="warn" onclick="setColor(this)">⚠ Hard</button>
    </div>
  </div>

  <div class="legend">
    <span style="font-size:0.67rem;color:#666">WR:</span>
    <div class="leg"><span class="sw" style="background:#1c6b30"></span>≥60%</div>

let favs = [];
try { favs = JSON.parse(localStorage.getItem('rosi-favs') || '[]'); } catch(e) {}

function saveFavs() {
  try { localStorage.setItem('rosi-favs', JSON.stringify(favs)); } catch(e) {}
}

function toggleFav(key) {
  const idx = favs.indexOf(key);
  if (idx >= 0) favs.splice(idx, 1);
  else favs.push(key);
  saveFavs();
  renderFavs();
  updateStarBtns();
}

function renderFavs() {
  const sec = document.getElementById('fav-section');
  if (!favs.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  let html = '<div class="fav-title">★ Favourites</div><div class="fav-grid">';
  favs.forEach(key => {
    const d = DECKLISTS[key];
    if (!d) return;
    const mi = getLM().findIndex(m => m.deck === key);
    const mName = mi >= 0 ? getLM()[mi].name : d.leaderName;
    html += `<div class="fav-card" onclick="showDeck('${key}',${mi})">
      <img src="${cardImg(d.leader)}"
        onload="this.classList.add('loaded')"
        onerror="this.onerror=null;"
        alt="${d.leaderName}">
      <div class="fav-label">${mName}</div>
      <button class="fav-rm" onclick="event.stopPropagation();toggleFav('${key}')" title="Remove">×</button>
    </div>`;
  });
  html += '</div>';
  sec.innerHTML = html;
}

function updateStarBtns() {
  document.querySelectorAll('.star-btn').forEach(btn => {
    const active = favs.includes(btn.dataset.deck);
    btn.classList.toggle('starred', active);
    btn.title = active ? 'Remove favourite' : 'Add to favourites';
  });
}

}
function setLogResult(r) {
  _logResult = r;
  document.querySelectorAll('#log-modal [data-result]').forEach(b => b.classList.toggle('active', b.dataset.result === r));
  _chkLogSave();

function _chkLogSave() { document.getElementById('log-save-btn').disabled = !(_logGo && _logResult); }

function saveLog() {
  if (!_logGo || !_logResult || !_logDeck) return;
  const note = (document.getElementById('log-note').value || '').trim();
  const m = getLM().find(m => m.deck === _logDeck);
  allGames.push({ leaderKey: currentLeaderKey, deckKey: _logDeck,
    matchupName: m ? m.name : _logDeck, go: _logGo, result: _logResult, note, ts: Date.now() });
  _saveGames();
  closeLogModal();
  _refreshYouCells();
  if (document.getElementById('screen-deck').classList.contains('active')) {
    _refreshMySection(_logDeck);
  }
}

    cell.innerHTML = rec.total > 0

      : '<span style="color:#252535">—</span>';
  });
}

function _buildMyHistoryHtml(deckKey) {
  const rec = personalRecord(currentLeaderKey, deckKey);
  const games = _gamesFor(currentLeaderKey, deckKey).slice().reverse();
  let recHtml = '';
  if (rec.total > 0) {
    const pct = Math.round(rec.w / rec.total * 100);
    recHtml = `<div class="my-record-row">
      <span class="my-record-num my-record-w">${rec.w}W</span>
      <span class="my-record-num my-record-l">${rec.l}L</span>
      <span class="my-record-pct">${pct}% personal WR (${rec.total} games)</span>
    </div>`;
  } else {
    recHtml = '<div style="font-size:0.7rem;color:#444;margin-bottom:8px">No games logged yet</div>';
  }
  const rows = games.slice(0, 12).map(g => {
    const d = new Date(g.ts);
    const ds = (d.getMonth()+1) + '/' + d.getDate();
    return `<div class="my-history-item">
      <span class="${g.result==='W'?'my-res-w':'my-res-l'}">${g.result}</span>
      <span class="my-go">${g.go}</span>
      ${g.note ? `<span class="my-note-text">${g.note}</span>` : '<span class="my-note-text" style="color:#333">—</span>'}
      <span class="my-date">${ds}</span>
    </div>`;
  }).join('');
  return recHtml + (rows ? `<div style="margin-top:6px">${rows}</div>` : '');
}

function _refreshMySection(deckKey) {
  const el = document.getElementById('my-hist-inner');
  if (el) el.innerHTML = _buildMyHistoryHtml(deckKey);
}

// Image cache - avoid re-fetching same URL
const imgCache = new Map();

function loadImg(el, src, isLeader) {
  if(!src) return;

  function applyLoaded(finalSrc) {
    imgCache.set(finalSrc, true);
    el.src = finalSrc;
    el.style.opacity = isLeader ? '1' : '';
    if(!isLeader) el.classList.add('loaded');
    el.dataset.loaded = '1';
  }

  function tryFallback() {
    // Try official Bandai site when optcgapi fails
    const m = src.match(/Card_Images\/(.+)\.jpg/);
    if(m) {
      const fb = `https://en.onepiece-cardgame.com/images/cardlist/card/${m[1]}.png`;
      el.onload = () => applyLoaded(fb);
      el.onerror = () => { if(!isLeader) el.classList.add('err'); el.dataset.loaded = '1'; };
      el.src = fb;
    } else {
      if(!isLeader) el.classList.add('err');
      el.dataset.loaded = '1';
    }
  }

  if(imgCache.has(src)){
    applyLoaded(src);
    return;
  }

  el.onload = () => applyLoaded(src);
  el.onerror = tryFallback;
  el.src = src;
}

function openModal(src, lbl) {
  if (!src) return;
  const modal = document.getElementById('modal');
  const img = document.getElementById('modal-img');
  const lbl_el = document.getElementById('modal-lbl');
  const spinner = document.getElementById('modal-spinner');
  img.style.opacity = '0';
  img.src = '';
  lbl_el.textContent = lbl;
  spinner.style.display = 'block';
  modal.classList.add('open');
  if(imgCache.has(src)){
    img.src = src;
    img.style.opacity = '1';
    spinner.style.display = 'none';
  } else {
    img.onload = () => { img.style.opacity = '1'; spinner.style.display = 'none'; imgCache.set(src, true); };
    img.onerror = () => { img.style.opacity = '0.3'; spinner.style.display = 'none'; };
    img.src = src;
  }
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function matchVisible(m) {
  const query = (document.getElementById('search-input').value || '').toLowerCase();
  const nameMatch = !query || m.name.toLowerCase().includes(query);
  let colorMatch = true;
  if (currentColor === 'warn') {
    colorMatch = m.warn;
  } else if (currentColor !== 'all') {
    const cols = getLCM()[m.name] || [];
    colorMatch = cols.includes(currentColor);
  }
  return nameMatch && colorMatch;
}

function applyFilters() {
  let anyVisible = false;
  getLM().forEach((m, i) => {
    const visible = matchVisible(m);
    if (visible) anyVisible = true;
    // Table rows
    const dataRow = document.querySelector(`tr.data-row[data-idx="${i}"]`);
    const detailRow = dataRow ? dataRow.nextSibling : null;
    if (dataRow) dataRow.style.display = visible ? '' : 'none';
    if (detailRow && detailRow.classList.contains('detail-row')) {
      detailRow.style.display = visible ? '' : 'none';
    }
    // Qref cards
    const qcard = document.getElementById('qref-' + i);
    if (qcard) qcard.classList.toggle('hidden', !visible);
  });
  const noRes = document.getElementById('no-results');
  if (noRes) noRes.style.display = anyVisible ? 'none' : 'block';
}

function buildQrefCards() {
  const container = document.getElementById('qref-container');
  container.innerHTML = '';
  getLM().forEach((m, i) => {
    const wrHtml = [
      m.wr1 != null ? `<span class="qref-wr ${wrCls(m.wr1)}">${m.wr1}% 1st</span>` : '',
      m.wr2 != null ? `<span class="qref-wr ${wrCls(m.wr2)}">${m.wr2}% 2nd</span>` : '',
    ].filter(Boolean).join('');

    const deckBtn = m.deck
      ? `<button class="qref-deck" data-deck="${m.deck}" onclick="event.stopPropagation();showDeck('${m.deck}',${i})">📋</button>`
      : '';
    const starBtn = m.deck
      ? `<button class="star-btn" data-deck="${m.deck}" onclick="event.stopPropagation();toggleFav('${m.deck}')" title="Favourite">★</button>`
      : '';

    let essHtml = '';
    if (m.essential && m.essential.length) {
      essHtml = `<div class="qref-section">
        <div class="qref-section-title">Essential Cards</div>
        <div class="qref-ess">
          ${m.essential.map(e=>`<div class="qref-ess-item"><span class="qref-ess-card">${e.card}:</span><span class="qref-ess-reason">${e.reason}</span></div>`).join('')}
        </div>
      </div>`;
    }

    const tipsHtml = m.tips && m.tips.length ? `<div class="qref-section">
      <div class="qref-section-title">Key Tips</div>
      <ul class="qref-tips">${m.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>` : '';

    const div = document.createElement('div');
    div.className = 'qref-card';
    div.id = 'qref-' + i;
    div.innerHTML = `
      <div class="qref-header">
        <span class="qref-name">${m.name}${m.warn ? '<span class="qref-warn"> ⚠</span>' : ''}</span>
        <div class="qref-wrs">${wrHtml}</div>
        <span class="qref-go ${m.go==='1st'?'go1':'go2'}">GO ${m.go}</span>
        ${starBtn}
        ${deckBtn}
      </div>
      <div class="qref-body">${essHtml}${tipsHtml}</div>`;
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('qref-deck') || e.target.closest('.qref-deck')) return;
      if (e.target.classList.contains('star-btn') || e.target.closest('.star-btn')) return;
      const wasOpen = div.classList.contains('open');
      document.querySelectorAll('.qref-card.open').forEach(d => d.classList.remove('open'));
      if (!wasOpen) div.classList.add('open');
    });
    container.appendChild(div);
  });
}

function rebuildMatchupTable() {
  tbody.innerHTML = '';
getLM().forEach((m, i) => {
  // essential
  let essHtml = '';
  if (m.essential.length) {
    essHtml = '<div class="ds"><div class="dl">Essential</div>'
      + m.essential.map(e=>`<div class="ei"><span class="ec">${e.card}:</span><span class="er">${e.reason}</span></div>`).join('')
      + '</div>';
  }
  // tips
  const tipsHtml = '<div class="ds"><div class="dl">Tips</div><ul class="tips-list">'
    + m.tips.map(t=>`<li>${t}</li>`).join('')
    + '</ul></div>';

  // deck cell
  const deckCell = m.deck
    ? `<td><button class="deck-btn" data-deck="${m.deck}">📋</button></td>`
    : `<td style="color:#2a2a2a;font-size:0.6rem;padding:5px 10px">—</td>`;

  const rec = personalRecord(currentLeaderKey, m.deck || '');
  const youCell = _youCellHtml(i, m.deck);
  const starCell = m.deck
    ? `<td style="padding:2px 4px;text-align:center;white-space:nowrap"><button class="star-btn" data-deck="${m.deck}" onclick="event.stopPropagation();toggleFav('${m.deck}')" title="Favourite">★</button><button class="log-btn" onclick="event.stopPropagation();openLogModal('${m.deck}','${m.name.replace(/'/g,"\'")}',event)" title="Log game">📋</button></td>`
    : `<td></td>`;

  const tr = document.createElement('tr');
  tr.className = 'data-row';
  tr.dataset.idx = i;
  tr.innerHTML = `
    <td><span class="mname">${m.name}</span>${colorDots(m.name)}${m.warn?'<span class="warn">⚠</span>':''}</td>
    <td><span class="go ${m.go==='1st'?'go1':'go2'}">${m.go}</span></td>
    <td><span class="wr ${wrCls(m.wr1)}">${wrLbl(m.wr1)}</span></td>
    <td><span class="wr ${wrCls(m.wr2)}">${wrLbl(m.wr2)}</span></td>
    <td class="sty">${m.style}</td>
    ${youCell}
    ${starCell}`;
  tbody.appendChild(tr);

  const dr = document.createElement('tr');
  dr.className = 'detail-row';
  dr.innerHTML = `<td colspan="7"><div class="detail-panel" id="panel-${i}">${essHtml}${tipsHtml}</div></td>`;
  tbody.appendChild(dr);
});

buildQrefCards();
renderFavs();
updateStarBtns();
}

// row click → open deck page
tbody.addEventListener('mouseover', e => {
  const row = e.target.closest('tr.data-row');
  if (!row) return;
  const m = getLM()[parseInt(row.dataset.idx)];
});

tbody.addEventListener('click', e => {
  const row = e.target.closest('tr.data-row');
  if (!row) return;
  const idx = parseInt(row.dataset.idx);
  const m = getLM()[idx];
  if (m && m.deck) {
    showDeck(m.deck, idx);
  } else if (m) {
    // No deck yet — still show tips panel inline as fallback
    const panel = document.getElementById('panel-'+idx);
    const open = panel.classList.contains('open');
    document.querySelectorAll('.detail-panel.open').forEach(p=>p.classList.remove('open'));
    document.querySelectorAll('tr.data-row.active').forEach(r=>r.classList.remove('active'));
    if (!open) { panel.classList.add('open'); row.classList.add('active'); }
  }
});

function renderLeaderGrid() {
  const grid = document.getElementById('leader-grid');
  grid.innerHTML = '';
  Object.keys(LEADERS).forEach(key => {
    const L = LEADERS[key];
    const card = document.createElement('div');
    card.className = 'leader-card';
    card.onclick = () => selectLeader(key);
    const imgUrl = 'https://en.onepiece-cardgame.com/images/cardlist/card/' + L.cardId + '.png';
    const img = document.createElement('img');
    img.src = imgUrl;
    img.alt = L.name;
    img.onerror = function(){ this.style.display='none'; };
    const nameDiv = document.createElement('div');
    nameDiv.className = 'lc-name';
    nameDiv.textContent = L.name;
    const idDiv = document.createElement('div');
    idDiv.className = 'lc-id';
    idDiv.textContent = L.cardId;
    card.appendChild(img);
    card.appendChild(nameDiv);
    card.appendChild(idDiv);
    grid.appendChild(card);
  });
}

function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-home').classList.add('active');
  renderLeaderGrid();
}

function selectLeader(key) {
  currentLeaderKey = key;
  const L = LEADERS[key];
  document.getElementById('matchup-title').textContent = L.title;
  document.getElementById('matchup-sub').textContent = L.sub;
  currentMode = 'table';
  currentColor = 'all';
  document.getElementById('btn-table').classList.add('active');
  document.getElementById('btn-qref').classList.remove('active');
  document.getElementById('table-container').classList.remove('hidden');
  document.getElementById('qref-container').classList.remove('visible');
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  document.querySelector('.fbtn-all').classList.add('active');
  const si = document.getElementById('search-input');
  if (si) si.value = '';
  rebuildMatchupTable();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-matchup').classList.add('active');
}


// ── RENDER DECK PAGE ─────────────────────────────────────────
function renderDeck(d, matchup, deckKey) {
  const total = d.sections.reduce((a,s)=>a+s.cards.reduce((b,c)=>b+c.count,0),0);

  // color pips for leader
  const colorPips = d.leaderColors.split('/').map(c=>{
    c = c.trim().toLowerCase();
    const cls = c==='red'?'pr':c==='green'?'pg':c==='purple'?'pp':c==='yellow'?'py':'pr';
    return `<span class="pip ${cls}"></span>${c.charAt(0).toUpperCase()+c.slice(1)}`;
  }).join(' / ');

  // Build matchup info panel if we have matchup data
  let matchupInfoHtml = '';
  if (matchup) {
    const wrHtml = [
      matchup.wr1 != null ? `<span class="mi-wr ${wrCls(matchup.wr1)}">${matchup.wr1}% 1st</span>` : '',
      matchup.wr2 != null ? `<span class="mi-wr ${wrCls(matchup.wr2)}">${matchup.wr2}% 2nd</span>` : '',
    ].filter(Boolean).join('');

    let essHtml = '';
    if (matchup.essential && matchup.essential.length) {
      essHtml = `<div class="mi-section">
        <div class="mi-section-title">Essential Cards</div>
        <div class="mi-ess">
          ${matchup.essential.map(e=>`<div class="mi-ess-item"><span class="mi-ess-card">${e.card}</span><span class="mi-ess-reason">${e.reason}</span></div>`).join('')}
        </div>
      </div>`;
    }

    const tipsHtml = matchup.tips && matchup.tips.length
      ? `<div class="mi-section">
          <div class="mi-section-title">Key Tips</div>
          <ul class="mi-tips">${matchup.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
        </div>`
      : '';

    matchupInfoHtml = `<div class="matchup-info">
      <div class="mi-header">
        <span class="mi-name">${matchup.name}${matchup.warn?' <span style="color:#e07050">⚠</span>':''}</span>
        <span class="mi-go ${matchup.go==='1st'?'go1':'go2'}">GO ${matchup.go}</span>
        <div class="mi-wrs">${wrHtml}</div>
        <span class="mi-style">${matchup.style}</span>
      </div>
      ${essHtml}${tipsHtml}
    </div><hr class="mi-divider">`;
  }

  let html = `${matchupInfoHtml}
    <div class="deck-header">
      <h2>${d.leaderName} — Decklist</h2>
      <div class="placement">${d.player} · ${d.placement}</div>
      <div class="meta">${d.location} · ${d.date}</div>
      <div class="tap-hint">Tap any card to enlarge</div>
    </div>

    <div class="leader-wrap">
      <img class="leader-img" id="leader-card"
        src="${cardImg(d.leader)}"
        onload="this.style.opacity='1'"
        onerror="console.error('IMG FAIL (leader):', this.src); this.onerror=null;"
        onclick="openModal(this.src,'${d.leader} - ${d.leaderName}')"
        alt="${d.leader}">
      <div class="linfo">
        <div class="lid">${d.leader} · ${colorPips} · ${d.leaderStats}</div>
        <div class="leff">${d.leaderEffect}</div>
      </div>
    </div>`;

  d.sections.forEach(sec => {
    const sTotal = sec.cards.reduce((a,c)=>a+c.count,0);
    html += `<div class="sec-wrap">
      <div class="sec-hdr">
        <span class="sec-title">${sec.title}</span>
        <span class="sec-cnt">×${sTotal}</span>
      </div>
      <div class="card-grid">`;
    sec.cards.forEach(card => {
      const src = cardImg(card.id);
      html += `<div class="card-item" onclick="openModal(this.querySelector('img').src,'${card.id}')">
        <img src="${src}"
          onload="this.classList.add('loaded')"
          onerror="console.error('IMG FAIL (card):', this.src); this.onerror=null;"
          alt="${card.name}">
        <div class="b-count">×${card.count}</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `<div class="total-bar">
    <span class="tl">Total cards</span>
    <span class="tc">${total}</span>
  </div>`;

  // source link at bottom
  html += `<a class="ext-link-bottom" href="${d.sourceUrl}" target="_blank">→ Source: onepiecetopdecks.com</a>`;

  // append my-section
  const existingNote = allNotes[_nk(currentLeaderKey, deckKey)] || '';
  const _mName = (matchup ? matchup.name : deckKey).replace(/'/g, '&#39;');
  html += `
  <div class="my-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="my-section-title" style="margin-bottom:0">📝 My Notes</div>
    </div>
    <textarea id="my-notes-ta" class="my-notes-area" placeholder="Your observations, what to remember next time…" oninput="saveNote('${deckKey}', this.value)"></textarea>
    <div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 6px">
      <div class="my-section-title" style="margin-bottom:0">📊 My Record</div>
      <button class="my-log-btn" onclick="openLogModal('${deckKey}','${_mName}',event)">+ Log Game</button>
    </div>
    <div id="my-hist-inner"></div>
  </div>`;
  document.getElementById('deck-content').innerHTML = html;
  // set textarea value after innerHTML (avoids HTML-encoding issues)
  const ta = document.getElementById('my-notes-ta');
  if (ta) ta.value = existingNote;
  // render history
  _refreshMySection(deckKey);
}
showHome();
</script>
</body>
